version: "3.8"

services:

  postgres-db:
    image: postgres:15
    container_name: store-postgres
    restart: always
    environment:
      POSTGRES_DB: storedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  store-app:
    build: .
    container_name: store-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/storedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MAIL_USERNAME: vickychowdary11@gmail.com
      MAIL_PASSKEY: gnsl mnvq sqlj byjd
      TZ: Asia/Kolkata
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"

volumes:
  postgres-data: