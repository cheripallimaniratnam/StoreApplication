<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="form-container">

        <h2 class="page-title">Add Stock</h2>

    <form th:action="@{/products/bulk-save}"
          th:object="${bulkBrand}"
          method="post">

        <!-- Category -->

        <div class="form-group">

            <label>Product Category</label>

            <select th:field="*{categoryId}" class="form-control">
                <option value="">-- Select Category --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}">
                </option>
            </select>

        </div>


        <!-- Brand Table -->

        <table class="product-table" id="brandTable">

            <thead>
            <tr>
                <th>Brand Name</th>
                <th>Unit Purchased Price</th>
                <th>Available Stock</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="brand, stat : *{brands}">

                <td>
                    <input type="text"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].name'" />
                </td>

                <td>
                    <input type="number"
                           step="0.1"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].price'" />
                </td>

                <td>
                    <input type="number"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].stockCount'" />
                </td>

                <td>
                    <button type="button"
                            class="danger-btn"
                            onclick="removeRow(this)">
                        Remove
                    </button>
                </td>

            </tr>

            </tbody>

        </table>


        <!-- Buttons -->

        <div class="form-buttons">

            <button type="button"
                    class="primary-btn"
                    onclick="addRow()">
                + Add Another Brand
            </button>

            <button type="submit"
                    class="success-btn">
                Save All Brands
            </button>

        </div>

    </form>


    <div class="back-section">
        <a th:href="@{/home}" class="secondary-btn">
            ← Return to Home
        </a>
    </div>

</div>

<script>
let index = 1;

function addRow() {

    let table = document.getElementById("brandTable");

    let row = table.insertRow();

    row.innerHTML =
        `<td><input class="table-input" type="text" name="brands[${index}].name"/></td>
         <td><input class="table-input" type="number" step="0.1" name="brands[${index}].price"/></td>
         <td><input class="table-input" type="number" name="brands[${index}].stockCount"/></td>
         <td><button type="button" class="danger-btn" onclick="removeRow(this)">Remove</button></td>`;

    index++;
}

function removeRow(button) {
    let row = button.parentNode.parentNode;
    row.parentNode.removeChild(row);
}
</script>

<script th:if="${error}">
    alert([[${error}]]);
</script>

</body>
</html>
