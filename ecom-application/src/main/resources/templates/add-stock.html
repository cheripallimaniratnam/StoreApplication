<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="form-container">

    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <img th:src="@{/images/logo.png}" class="nav-logo">
            <div class="brand-text">
                <h1 class="brand-title">Add Stock</h1>
            </div>
        </div>

        <a th:href="@{/home}" class="secondary-btn">
            ← Return to Home
        </a>
    </div>
    <br><br>
    <form th:action="@{/products/bulk-save}"
          th:object="${bulkBrand}"
          method="post"
          onsubmit="return validateCategory()">

        <!-- Category -->

        <div class="form-group">

            <label>Product Category</label>

            <select th:field="*{categoryId}" class="form-control" id="categorySelect">
                <option value="">-- Select Category --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}">
                </option>
            </select>

        </div>


        <!-- Brand Table -->

        <table class="product-table" id="brandTable">

            <thead>
            <tr>
                <th>Brand Name</th>
                <th>Available Stock</th>
                <th>Unit Purchased Price</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="brand, stat : *{brands}">

                <td>
                    <input type="text"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].name'"
                           oninput="this.value = this.value.toUpperCase()"/>
                </td>

                <td>
                    <input type="number"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].stockCount'"/>
                </td>

                <td>
                    <input type="number"
                           step="0.1"
                           class="table-input"
                           th:name="'brands[' + ${stat.index} + '].price'"/>
                </td>

                <td>
                    <button type="button"
                            class="danger-btn"
                            onclick="removeRow(this)">
                        Remove
                    </button>
                </td>

            </tr>

            </tbody>

        </table>


        <!-- Buttons -->

        <div class="form-buttons">

            <button type="button"
                    class="primary-btn"
                    onclick="addRow()">
                + Add Another Brand
            </button>

            <button type="submit"
                    class="success-btn">
                Save All Brands
            </button>

        </div>

        <!-- Success / Error Messages -->
        <div th:if="${success}" class="success">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

    </form>

</div>

<script>
let index = 1;

function addRow() {

    let table = document.getElementById("brandTable");

    let row = table.insertRow();

    row.innerHTML =
            `<td>
            <input class="table-input" type="text"
            name="brands[${index}].name"
            oninput="this.value = this.value.toUpperCase()"/>
            </td>

            <td>
            <input class="table-input" type="number"
            name="brands[${index}].stockCount"/>
            </td>

            <td>
            <input class="table-input" type="number"
            step="0.1"
            name="brands[${index}].price"/>
            </td>

            <td>
            <button type="button" class="danger-btn"
            onclick="removeRow(this)">Remove</button>
            </td>`;

    index++;
}

function removeRow(button) {
    let row = button.parentNode.parentNode;
    row.parentNode.removeChild(row);
}

function validateCategory(){

    let category = document.getElementById("categorySelect");

    if(category.value === ""){

        alert("Please select a product category.");

        category.style.border = "2px solid red";
        category.focus();

        return false;
    }
    // Handle empty stock and price
    document.querySelectorAll("input[name*='stockCount']").forEach(function(input){
        if(input.value === "" || input.value === null){
            input.value = 0;
        }
    });

    document.querySelectorAll("input[name*='price']").forEach(function(input){
        if(input.value === "" || input.value === null){
            input.value = 0;
        }
    });

    return true;
}



</script>

<script th:if="${error}">
    alert([[${error}]]);



</script>

</body>
</html>
