<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Sales Transaction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <div class="header">
        <div class="logo-section">
            <img th:src="@{/images/logo.png}" class="nav-logo">
            <div class="brand-text">
                <h1 class="brand-title">Sales Processing</h1>
            </div>
        </div>
        <a th:href="@{/home}" class="secondary-btn">Home</a>
    </div>

    <div class="welcome-section">
        <h2>Record a New Sale</h2>
        <p>Please enter the customer information and add product items.</p>
    </div>

    <div class="form-container">

        <form th:action="@{/sales/process}" method="post">

            <div class="form-group">

                <label>Customer Mobile</label>

                <input type="tel"
                       id="customerMobile"
                       class="form-control"
                       name="customerMobile"
                       maxlength="10"
                       pattern="[0-9]{10}"
                       required>

            </div>

            <div class="form-group">

                <label>Customer Name</label>

                <input type="text"
                       id="customerName"
                       class="form-control"
                       name="customerName"
                       required>

            </div>

            <h3 class="page-title">Sale Items</h3>

            <table class="product-table">

                <thead>
                <tr>
                    <th>Brand</th>
                    <th>Quantity</th>
                    <th>Selling Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="saleBody">

                <tr>

                    <td style="position:relative">

                        <input type="text"
                               class="form-control brandSearch"
                               placeholder="Type brand name">

                        <input type="hidden"
                               name="items[0].brandId"
                               class="brandId">

                        <div class="brandDropdown"></div>

                    </td>

                    <td>

                        <input type="number"
                               class="table-input"
                               name="items[0].quantity"
                               min="1"
                               oninput="calculateRow(this)"
                               required>

                    </td>

                    <td>

                        <input type="number"
                               class="table-input"
                               step="0.01"
                               name="items[0].sellingPrice"
                               oninput="calculateRow(this)"
                               required>

                    </td>

                    <td>

                        ₹ <span class="rowTotal">0</span>

                    </td>

                    <td>

                        <button type="button"
                                class="danger-btn"
                                onclick="removeRow(this)">
                            Remove
                        </button>

                    </td>

                </tr>

                </tbody>

            </table>

            <br>

            <button type="button"
                    class="primary-btn"
                    onclick="addRow()">
                + Add Item
            </button>

            <h3 style="margin-top:20px">

                Grand Total ₹ <span id="grandTotal">0</span>

            </h3>

            <div class="form-buttons">

                <button type="submit"
                        class="success-btn">
                    Complete Sale
                </button>

            </div>

            <!-- Success / Error Messages -->
            <div th:if="${success}" class="success">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="error">
                <span th:text="${error}"></span>
            </div>

        </form>

    </div>
</div>

<script>

let rowIndex = 1;

let brands = [];

$(document).ready(function(){

// Load brands list

$.get("/products/all-brands",function(data){

brands = data;

});

// customer lookup

$("#customerMobile").on("input",function(){

const mobile = $(this).val();

if(mobile.length===10){

$.ajax({

url:'/customers/findByMobile',

data:{mobile:mobile},

success:function(data){

$("#customerName").val(data.name || "");

}

});

}

});

});

function addRow(){

const table = document.getElementById("saleBody");

const row = table.insertRow();

row.innerHTML = `

<td style="position:relative">

<input type="text"
class="form-control brandSearch"
placeholder="Type brand name">

<input type="hidden"
name="items[${rowIndex}].brandId"
class="brandId">

<div class="brandDropdown"></div>

</td>

<td>
<input type="number"
class="table-input"
name="items[${rowIndex}].quantity"
min="1"
oninput="calculateRow(this)">
</td>

<td>
<input type="number"
step="0.01"
class="table-input"
name="items[${rowIndex}].sellingPrice"
oninput="calculateRow(this)">
</td>

<td>
₹ <span class="rowTotal">0</span>
</td>

<td>
<button type="button"
class="danger-btn"
onclick="removeRow(this)">Remove</button>
</td>
`;

rowIndex++;

row.querySelector(".brandSearch").focus();

}

function removeRow(btn){

const rows =
document.querySelectorAll("#saleBody tr");

if(rows.length===1){

alert("At least one item required");

return;

}

btn.closest("tr").remove();

updateGrandTotal();

}

// brand autocomplete

$(document).on("input",".brandSearch",function(){

const input = $(this);

const value = input.val().toLowerCase();

const dropdown = input.siblings(".brandDropdown");

dropdown.empty();

if(value.length < 1){
dropdown.hide();
return;
}

const matches = brands.filter(b=>
b.name.toLowerCase().includes(value)
);
if(matches.length === 0){
dropdown.hide();
return;
}
matches.forEach(b=>{

dropdown.append(

`<div class="brandItem"
data-id="${b.id}"
data-stock="${b.stockCount}">
${b.name} (Stock:${b.stockCount})
</div>`

);

});

dropdown.show();
});

$(document).click(function(e){
if(!$(e.target).closest(".brandSearch").length){
$(".brandDropdown").hide();
}
});
// select brand

$(document).on("click",".brandItem",function(){

const item = $(this);

const row = item.closest("td");

const brandId = item.data("id");

let duplicate=false;

$(".brandId").each(function(){

if($(this).val()==brandId){

duplicate=true;

}

});

if(duplicate){

alert("Brand already selected");

return;

}

row.find(".brandSearch").val(item.text());

row.find(".brandId").val(brandId);

row.find(".brandDropdown").empty();

});

// calculation

function calculateRow(el){

const row = el.closest("tr");

const qty =
parseFloat(row.querySelector("[name*='quantity']").value)||0;

const price =
parseFloat(row.querySelector("[name*='sellingPrice']").value)||0;

const total = qty*price;

row.querySelector(".rowTotal").innerText =
total.toFixed(2);

updateGrandTotal();

}

function updateGrandTotal(){

let total=0;

document.querySelectorAll(".rowTotal")
.forEach(el=>{

total += parseFloat(el.innerText)||0;

});

document.getElementById("grandTotal")
.innerText = total.toFixed(2);

}

</script>

</body>
</html>
