<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Sales Transaction</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="dashboard-container">

    <!-- Page Header -->
    <div class="header">
        <div class="logo-section">
            <h1 class="brand-title">Sales Processing</h1>
        </div>

        <a th:href="@{/home}" class="secondary-btn">Home</a>
    </div>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h2>Record a New Sale</h2>
        <p>Please enter the customer information and add product items to complete the sale transaction.</p>
    </div>

    <!-- Sales Form -->
    <div class="form-container">

        <form th:action="@{/sales/process}" method="post">

            <!-- Customer Details -->
            <div class="form-group">
                <label>Customer Mobile Number</label>
                <input type="text" id="customerMobile" class="form-control"
                       name="customerMobile"
                       th:value="${saleRequest.customerMobile}"
                       placeholder="Enter customer mobile number"
                       required>
            </div>

            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customerName" class="form-control"
                       name="customerName"
                       th:value="${saleRequest.customerName}"
                       placeholder="Customer name will auto-fill if existing"
                       required>
            </div>

            <!-- Sale Items Table -->
            <h3 class="page-title">Sale Items</h3>

            <table class="product-table">
                <thead>
                <tr>
                    <th>Brand</th>
                    <th>Quantity</th>
                    <th>Unit Selling Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="saleBody">

                <tr>
                    <td>
                        <select class="form-control" name="items[0].brandId" required>
                            <option value="">Select Brand</option>

                            <option th:each="b : ${brands}"
                                    th:value="${b.id}"
                                    th:text="${b.name + ' (Stock: ' + b.stockCount + ')'}">
                            </option>

                        </select>
                    </td>

                    <td>
                        <input type="number" class="table-input"
                               name="items[0].quantity"
                               min="1"
                               oninput="calculateRow(this)"
                               required>
                    </td>

                    <td>
                        <input type="number" step="0.01"
                               class="table-input"
                               name="items[0].soldPrice"
                               oninput="calculateRow(this)"
                               required>
                    </td>

                    <td>
                        ₹ <span class="rowTotal">0</span>
                    </td>

                    <td>
                        <button type="button"
                                class="danger-btn"
                                onclick="removeRow(this)">
                            Remove
                        </button>
                    </td>

                </tr>

                </tbody>

            </table>

            <br>

            <button type="button" class="primary-btn" onclick="addRow()">
                + Add Another Item
            </button>

            <h3 style="margin-top:20px;">
                Grand Total: ₹ <span id="grandTotal">0</span>
            </h3>

            <!-- Form Buttons -->
            <div class="form-buttons">

                <button type="submit" class="success-btn">
                    Complete Sale
                </button>

                <a th:href="@{/home}" class="secondary-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

<!-- JS for rows and totals -->
<script>

let rowIndex = 1;

function addRow() {

    const table = document.getElementById("saleBody");
    const row = document.createElement("tr");

    row.innerHTML =
        document.querySelector("#saleBody tr").innerHTML
        .replaceAll("items[0]", "items[" + rowIndex + "]");

    table.appendChild(row);

    rowIndex++;
}

function removeRow(btn) {

    btn.closest("tr").remove();

    updateGrandTotal();
}

function calculateRow(el) {

    const row = el.closest("tr");

    const qty =
        parseFloat(row.querySelector("input[name*='quantity']").value) || 0;

    const price =
        parseFloat(row.querySelector("input[name*='soldPrice']").value) || 0;

    const total = qty * price;

    row.querySelector(".rowTotal").innerText =
        total.toFixed(2);

    updateGrandTotal();
}

function updateGrandTotal() {

    let grandTotal = 0;

    document.querySelectorAll(".rowTotal").forEach(el => {

        grandTotal += parseFloat(el.innerText) || 0;

    });

    document.getElementById("grandTotal").innerText =
        grandTotal.toFixed(2);
}

$(document).ready(function() {

    $("#customerMobile").on("input", function() {

        const mobile = $(this).val();

        if (mobile.length >= 10) {

            $.ajax({

                url: '/customers/findByMobile',

                type: 'GET',

                data: { mobile: mobile },

                success: function(data) {

                    if (data.name) {

                        $("#customerName").val(data.name);

                    } else {

                        $("#customerName").val('');

                    }

                },

                error: function() {

                    $("#customerName").val('');

                }

            });

        } else {

            $("#customerName").val('');

        }

    });

});

</script>

<script th:inline="javascript" th:if="${error}">
    alert([[${error}]]);
</script>

<div th:if="${success}" class="success">
    <span th:text="${success}"></span>
</div>

</body>
</html>
