<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock Invetory</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body class="dashboard-body">

<div class="table-container">

    <div class="header">

        <div class="logo-section">
            <img th:src="@{/images/logo.png}" class="nav-logo">
            <div class="brand-text">
                <h1 class="brand-title">Product Inventory</h1>
            </div>
        </div>
        <a th:href="@{/products/bulk-add}" class="secondary-btn">
            + Add Stock
        </a>

    </div>

    <br><br>
    <table class="product-table">

        <thead>
        <tr>
<!--            <th>ID</th>-->
            <th>Category</th>
            <th>Brand Name</th>
            <th>Stock</th>
            <th>Purchased Price</th>
            <th>Created Date</th>
            <th>Last Modified</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="b : ${brands}">
<!--            <td th:text="${b.id}"></td>-->
            <td th:text="${b.category != null ? b.category.name : 'N/A'}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.stockCount}"></td>
            <td th:text="${b.price}"></td>
            <td th:text="${b.createdDate}"></td>
            <td th:text="${b.lastModifiedDate}"></td>
        </tr>
        </tbody>

    </table>

    <br><br>
    <div class="back-section">
        <a th:href="@{/home}" class="secondary-btn">← Return to Home</a>
    </div>

</div>

</body>
</html>
